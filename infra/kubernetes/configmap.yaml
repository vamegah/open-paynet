apiVersion: v1
kind: ConfigMap
metadata:
  name: openpaynet-shared-config
  namespace: openpaynet
data:
  ALLOW_INSECURE_DEFAULT_SECRETS: "false"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_URL: redis://redis:6379
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@ledger-db:5432/ledger
  ELASTICSEARCH_HOST: http://elasticsearch:9200
  ELASTICSEARCH_USERNAME: elastic
  JWT_ISSUER: openpaynet-auth
  JWT_AUDIENCE: openpaynet-api
  DEFAULT_SUBJECT_ROLE: payment_initiator
  DEFAULT_SUBJECT_SCOPES: payments:write ledger:read
  BAD_IP_ADDRESSES: 10.0.0.13,203.0.113.66
  GEO_MISMATCH_THRESHOLD_KM: "500.0"
  MAX_PROCESSING_RETRIES: "3"
  KAFKA_OPERATION_TIMEOUT_SECONDS: "3.0"
  DATABASE_OPERATION_TIMEOUT_SECONDS: "3.0"
  ELASTICSEARCH_OPERATION_TIMEOUT_SECONDS: "3.0"
  EVENT_PUBLISH_TIMEOUT_SECONDS: "2.0"
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "3"
  CIRCUIT_BREAKER_RESET_TIMEOUT_SECONDS: "15.0"
  SQLALCHEMY_ECHO: "false"
