apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: openpaynet
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8100
      targetPort: 8100
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: openpaynet
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8300
      targetPort: 8300
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: openpaynet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: openpaynet/auth-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: openpaynet-shared-config
            - secretRef:
                name: openpaynet-app-secrets
          ports:
            - containerPort: 8100
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: openpaynet
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: openpaynet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: openpaynet/api-gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: openpaynet-shared-config
            - secretRef:
                name: openpaynet-app-secrets
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: openpaynet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: openpaynet/payment-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: openpaynet-shared-config
            - secretRef:
                name: openpaynet-app-secrets
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f 'python -m app.main' >/dev/null"]
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f 'python -m app.main' >/dev/null"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
---
